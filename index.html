<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>Anchored Steps — 52 Weeks of Faith in Action</title>
    <link rel="apple-touch-icon" href="/icon.png" />
    <link rel="icon" type="image/png" href="/icon.png" />
    <link rel="manifest" href="/manifest.json" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Anchored Steps" />
    <meta name="theme-color" content="#0F1A24" /><!-- anchored -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;500;600;700&family=EB+Garamond:ital,wght@0,400;0,500;0,600;1,400;1,500&display=swap" rel="stylesheet">
    <style>
        body{font-family:'EB Garamond',Georgia,serif;-webkit-font-smoothing:antialiased;-moz-osx-font-smoothing:grayscale}
      @keyframes fu{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}.fu{animation:fu .35s ease both}
      @keyframes fi{from{opacity:0}to{opacity:1}}.fi{animation:fi .25s ease both}
      @keyframes sd{from{opacity:0;transform:translateY(-6px)}to{opacity:1;transform:translateY(0)}}.sd{animation:sd .28s ease both}
      *{box-sizing:border-box}
      body{background:#0F1A24;margin:0;padding-top:env(safe-area-inset-top);padding-bottom:env(safe-area-inset-bottom);padding-left:env(safe-area-inset-left);padding-right:env(safe-area-inset-right)}
      button{transition:all .2s ease;cursor:pointer}
      button:hover{filter:brightness(1.1);transform:translateY(-1px)}
      button:active{transform:scale(0.97) translateY(0)!important}
      textarea:focus,input:focus{border-color:rgba(176,138,78,0.45)!important;box-shadow:0 0 0 3px rgba(176,138,78,0.08)!important;outline:none!important}
      ::-webkit-scrollbar{width:4px}
      ::-webkit-scrollbar-thumb{background:rgba(176,138,78,0.25);border-radius:3px}
      textarea,input{resize:vertical;font-family:"EB Garamond",Georgia,serif}
    </style>
    <meta name="description" content="52 Weeks of Faith in Action — a Christ-centered digital journal by Elora Radiance." />
  </head>
  <body>
    <div id="root"></div>
    <noscript>
      <div style="padding:40px;text-align:center;color:#F5F1E8;font-family:Georgia,serif">
        <h1>JavaScript is required</h1>
        <p>Anchored Steps needs JavaScript enabled to run.</p>
      </div>
    </noscript>
    <script src="/data.js"></script>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
